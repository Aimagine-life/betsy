name: morning_brief
description: Утренняя сводка — погода, напоминания, ключевые факты дня.
trigger:
  type: cron
  cron: "0 8 * * *"
steps:
  - kind: prompt
    prompt: |
      Сгенерируй короткое доброе утро на русском (1-2 предложения),
      без emoji, в дружелюбном тоне.
    saveAs: greeting
  - kind: prompt
    prompt: |
      Составь короткую сводку дня (3-4 пункта) на основе того, что ты знаешь
      о пользователе. Без воды, по делу.
    saveAs: brief
